{% extends "base.html" %}

{% block title %}Восстановление пароля{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1);">
    <h2 style="text-align: center; margin-bottom: 25px;">🔑 Восстановление пароля</h2>
    
    {% if message %}
    <div style="background: #d4edda; color: #155724; padding: 12px; border-radius: 8px; margin-bottom: 20px;">
        {{ message }}
    </div>
    {% endif %}
    
    {% if error %}
    <div style="background: #f8d7da; color: #721c24; padding: 12px; border-radius: 8px; margin-bottom: 20px;">
        {{ error }}
    </div>
    {% endif %}
    
    {% if not reset_mode %}
    <form method="POST" action="/forgot_password">
        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px;">Ваш Email:</label>
            <input type="email" name="email" required
                   style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
        </div>
        <button type="submit" style="width: 100%; padding: 14px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer;">
            Отправить
        </button>
    </form>
    {% else %}
    <form method="POST" action="/reset_password">
        <input type="hidden" name="email" value="{{ email }}">
        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px;">Новый пароль:</label>
            <input type="password" name="new_password" required
                   style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
        </div>
        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px;">Подтвердите пароль:</label>
            <input type="password" name="confirm_password" required
                   style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
        </div>
        <button type="submit" style="width: 100%; padding: 14px; background: #27ae60; color: white; border: none; border-radius: 8px; cursor: pointer;">
            Сбросить пароль
        </button>
    </form>
    {% endif %}
    
    <p style="text-align: center; margin-top: 20px;">
        <a href="/login" style="color: #667eea;">← Вернуться к входу</a>
    </p>
</div>
{% endblock %}
