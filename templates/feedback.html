{% extends "base.html" %}
{% block title %}Обратная связь{% endblock %}
{% block content %}
<div style="max-width: 500px; margin: 50px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);">
    <h2>Обратная связь</h2>
    {% if session.feedback_sent %}
        <div style="background: #d4edda; padding: 15px; border-radius: 8px;">
            Спасибо за ваше сообщение!
        </div>
        <a href="/" style="display: block; margin-top: 15px; color: #716e6e;">← Вернуться на главную</a>
    {% else %}
        <form method="POST" action="/feedback">
            <div style="margin-bottom: 15px;">
                <label>Ваше имя:</label>
                <input type="text" name="name" value="{{ session.username or '' }}"
                       style="width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box;">
            </div>
            <div style="margin-bottom: 15px;">
                <label>Email:</label>
                <input type="email" name="email" required
                       style="width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box;">
            </div>
            <div style="margin-bottom: 15px;">
                <label>Сообщение:</label>
                <textarea name="message" rows="5" required
                          style="width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; resize: vertical; box-sizing: border-box;"></textarea>
            </div>
            <button type="submit" class="btn" style="width: 100%; background: #716e6e; border: none;">
                Отправить
            </button>
        </form>
    {% endif %}
</div>
{% endblock %}
