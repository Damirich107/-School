{% extends "base.html" %}

{% block title %}Мои заявки{% endblock %}

{% block content %}
<div class="applications-page">
    <div class="page-header-card">
        <h1>Мои заявки на обучение</h1>
        <p>История ваших обращений</p>
    </div>

    <div class="applications-card">
        <h2>Ваши заявки</h2>
        <div class="divider"></div>

        <div id="applicationsLoading" class="loading-message">
            <div class="spinner"></div>
            <p>Загрузка...</p>
        </div>

        <div id="applicationsEmpty" class="empty-message" style="display: none;">
            <p>У вас пока нет заявок</p>
        </div>

        <div id="applicationsTableWrapper" class="table-wrapper" style="display: none;">
            <table class="applications-table">
                <thead>
                    <tr>
                        <th>№</th>
                        <th>Курс</th>
                        <th>Статус</th>
                        <th>Дата</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody id="applicationsTableBody">
                    <!-- Заявки загружаются через JS -->
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
